<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Навигация по лабораторным</title>
  <style>
    :root {
      --bg-1: #e9f1ff;
      --bg-2: #ffeecb;
      --text: #10243f;
      --accent: #0f5cc0;
      --card: #ffffff;
      --border: #0f5cc0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(860px, 100%);
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 8px 8px 0 #183966;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 40px);
    }

    p {
      margin: 0 0 16px;
      line-height: 1.5;
      font-weight: 700;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      text-decoration: none;
      color: #ffffff;
      background: var(--accent);
      border: 2px solid #082f65;
      border-radius: 12px;
      padding: 14px 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    a:hover,
    a:focus-visible {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    small {
      display: block;
      margin-top: 14px;
      color: #304f79;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Навигация по лабораторным</h1>
    <p>Откройте нужный сайт по кнопкам ниже.</p>
    <div class="links">
      <a href="./lab1/">Лабораторная работа 1</a>
      <a href="./lab_2_4/">Лабораторные работы 2-4</a>
    </div>
    <small>Репозиторий: Welanie/10_Ivanov_Web</small>
  </main>
</body>
</html>
